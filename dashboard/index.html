<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hermes ↔ Perplexity MCP</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
--text:#e8e8e8;--muted:#888;--faint:#444;--primary:#4f98a3;--primary-h:#227f8b;
--success:#6daa45;--error:#dd6974;--warn:#fdab43;
--font:'Inter',system-ui,sans-serif;--radius:8px;--radius-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);
min-height:100vh;font-size:14px;line-height:1.5}
.app{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:0 20px;
background:var(--surface);border-bottom:1px solid var(--border)}
header svg{color:var(--primary);flex-shrink:0}
header h1{font-size:16px;font-weight:600;flex:1}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--faint);transition:.3s}
.status-dot.ready{background:var(--success)}
.status-dot.warn{background:var(--warn)}
.status-dot.error{background:var(--error)}
.status-label{font-size:12px;color:var(--muted)}
main{display:grid;grid-template-columns:300px 1fr;overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);
overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);
text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.card{background:var(--surface2);border:1px solid var(--border);
border-radius:var(--radius);padding:12px}
.model-select{width:100%;padding:8px 10px;background:var(--bg);
border:1px solid var(--border);border-radius:var(--radius);
color:var(--text);font-size:13px;cursor:pointer}
.model-select:focus{outline:2px solid var(--primary);outline-offset:2px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;
padding:8px 14px;border-radius:var(--radius);font-size:13px;
font-weight:500;cursor:pointer;border:none;transition:.18s;width:100%}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--surface2)}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);
padding:16px;text-align:center;cursor:pointer;transition:.18s;color:var(--muted);font-size:12px}
.upload-area:hover{border-color:var(--primary);color:var(--primary)}
.upload-area.has-file{border-color:var(--success);color:var(--success);background:rgba(109,170,69,.08)}
.file-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 8px;
background:var(--bg);border-radius:6px;font-size:12px}
.file-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item a{color:var(--primary);text-decoration:none;font-size:11px}
.chat-area{display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:78%;padding:10px 14px;border-radius:var(--radius-lg);font-size:13px;line-height:1.6;position:relative}
.msg.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.ai{background:var(--surface2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg.system{background:transparent;border:1px solid var(--border);
color:var(--muted);align-self:center;font-size:12px;max-width:90%;text-align:center}
.msg.thinking{background:var(--surface2);border:1px dashed var(--border);
align-self:flex-start;border-bottom-left-radius:4px;color:var(--muted);font-style:italic}
/* Role labels */
.msg-role{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;display:block}
.msg.user .msg-role{color:rgba(255,255,255,.75)}
.msg.ai .msg-role{color:var(--primary)}
/* Timestamp */
.msg-time{font-size:10px;color:rgba(255,255,255,.4);margin-top:6px;display:block;text-align:right}
.msg.ai .msg-time{color:var(--muted)}
.msg .model-tag{font-size:11px;opacity:.6;margin-top:6px;padding-top:6px;
border-top:1px solid rgba(255,255,255,.08)}
.msg .attach-badge{display:inline-flex;align-items:center;gap:5px;
background:rgba(255,255,255,.12);border-radius:4px;padding:3px 7px;
font-size:11px;margin-bottom:6px}
.input-row{padding:12px 16px;border-top:1px solid var(--border);
background:var(--surface);display:flex;gap:8px;align-items:flex-end}
.input-col{flex:1;display:flex;flex-direction:column;gap:6px}
.attach-preview{display:none;align-items:center;gap:6px;padding:5px 10px;
background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
font-size:12px;color:var(--text)}
.attach-preview.show{display:flex}
.attach-preview .remove{cursor:pointer;color:var(--muted);margin-left:auto;font-size:14px;line-height:1}
.attach-preview .remove:hover{color:var(--error)}
.input-row textarea{width:100%;padding:10px 14px;background:var(--bg);
border:1px solid var(--border);border-radius:var(--radius-lg);
color:var(--text);font-size:13px;resize:none;min-height:42px;max-height:120px;
font-family:inherit;line-height:1.5}
.input-row textarea:focus{outline:2px solid var(--primary);outline-offset:2px}
.send-btn{padding:10px 18px;background:var(--primary);color:#fff;
border:none;border-radius:var(--radius-lg);cursor:pointer;
font-size:13px;font-weight:500;transition:.18s;white-space:nowrap;align-self:flex-end}
.send-btn:hover{background:var(--primary-h)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.log-area{font-size:11px;color:var(--muted);background:var(--bg);
padding:6px 12px;border-top:1px solid var(--border);height:32px;
overflow:hidden;font-family:monospace;white-space:nowrap;text-overflow:ellipsis}
input[type=file]{display:none}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.dot-blink{animation:blink 1.2s ease-in-out infinite}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <header>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    <h1>Hermes ↔ Perplexity MCP <span style="color:var(--muted);font-weight:400">v9.7</span></h1>
    <div class="status-dot" id="dot"></div>
    <span class="status-label" id="statusLabel">Connecting…</span>
  </header>
  <main>
    <aside class="sidebar">
      <div>
        <div class="section-title">Model</div>
        <div class="card" style="gap:8px;display:flex;flex-direction:column">
          <select class="model-select" id="modelSel" onchange="switchModel(this.value)">
            <option>Default</option>
            <option>Claude Sonnet 4.5</option>
            <option>GPT-4o</option>
            <option>Gemini 2.0 Flash</option>
            <option>Sonar Pro</option>
            <option>Sonar</option>
            <option>R1 1776</option>
          </select>
          <div style="font-size:11px;color:var(--muted)" id="modelStatus">—</div>
        </div>
      </div>
      <div>
        <div class="section-title">Upload File → Perplexity</div>
        <div class="card" style="gap:8px;display:flex;flex-direction:column">
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fu').click()">
            📎 Click to select file
          </div>
          <input type="file" id="fu" onchange="onFileChosen(this)">
          <div class="file-list" id="uploadList"></div>
        </div>
      </div>
      <div>
        <div class="section-title">Downloads from Perplexity</div>
        <div class="card">
          <div class="file-list" id="dlList"></div>
          <button class="btn btn-secondary" style="margin-top:8px" onclick="refreshDL()">⟳ Refresh</button>
        </div>
      </div>
      <div>
        <div class="section-title">Actions</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-secondary" onclick="newChat()">＋ New Chat</button>
          <button class="btn btn-secondary" onclick="takeShot()">📷 Screenshot</button>
          <button class="btn btn-secondary" onclick="checkLogin()">🔑 Check Login</button>
        </div>
      </div>
    </aside>
    <section class="chat-area">
      <div class="messages" id="msgs">
        <div class="msg system">Connect Hermes Agent via SSE at <code>http://localhost:3456/sse</code></div>
      </div>
      <div class="log-area" id="log">Waiting for events…</div>
      <div class="input-row">
        <div class="input-col">
          <div class="attach-preview" id="attachPreview">
            <span id="attachName"></span>
            <span class="remove" onclick="clearAttach()" title="Remove">×</span>
          </div>
          <textarea id="inp" rows="1" placeholder="Send message to Perplexity…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
      </div>
    </section>
  </main>
</div>
<script>
const BASE='';
let es, sending=false, pendingFile=null, thinkingEl=null;

function logLine(msg){
  const el=document.getElementById('log');
  el.textContent=new Date().toLocaleTimeString()+' '+msg;
}

function nowTime(){
  return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function addMsg(role, text, model, attachName){
  const c=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg '+role;
  let html='';

  // Role label for user and ai messages
  if(role==='user'){
    html+=`<span class="msg-role">Admin</span>`;
  } else if(role==='ai'){
    html+=`<span class="msg-role">Agent</span>`;
  }

  if(attachName){
    html+=`<div class="attach-badge">📎 ${escHtml(attachName)}</div><br>`;
  }

  html+=escHtml(text).replace(/\n/g,'<br>');

  if(model) html+=`<div class="model-tag">Model: ${escHtml(model)}</div>`;

  // Timestamp for user and ai messages
  if(role==='user'||role==='ai'){
    html+=`<span class="msg-time">${nowTime()}</span>`;
  }

  d.innerHTML=html;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
  return d;
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showThinking(){
  removeThinking();
  const c=document.getElementById('msgs');
  thinkingEl=document.createElement('div');
  thinkingEl.className='msg thinking';
  thinkingEl.innerHTML='<span class="dot-blink">●●●</span>&nbsp; Thinking…';
  c.appendChild(thinkingEl);
  c.scrollTop=c.scrollHeight;
}

function removeThinking(){
  if(thinkingEl){thinkingEl.remove();thinkingEl=null;}
}

function setStatus(state, label){
  document.getElementById('dot').className='status-dot'+(state?' '+state:'');
  document.getElementById('statusLabel').textContent=label;
}

function connectSSE(){
  es=new EventSource(BASE+'/sse');
  es.onmessage=e=>{try{handleEvent(JSON.parse(e.data));}catch(err){logLine('parse error: '+err);}};
  es.onerror=()=>{
    setStatus('error','Disconnected – retrying…');
    setTimeout(connectSSE,3000);
  };
}

let reconnectMsgEl=null;

function handleEvent(ev){
  const d=ev.data||{};
  logLine(ev.type+' '+JSON.stringify(d).slice(0,80));

  switch(ev.type){
    case 'mcp_init':
    case 'ping':
      break;

    case 'browser_ready':
      reconnectMsgEl=null;
      setStatus(d.logged_in?'ready':'warn', d.logged_in?'✓ Ready & Logged In':'⚠ Ready – Please Sign In');
      addMsg('system', d.note||'Browser ready');
      break;

    case 'browser_reconnecting':
      if(reconnectMsgEl){
        reconnectMsgEl.textContent='🔄 Reconnecting…';
      } else {
        reconnectMsgEl=addMsg('system','🔄 Reconnecting…');
      }
      setStatus('error','Reconnecting…');
      break;

    case 'browser_error':
      setStatus('error','Browser error');
      addMsg('system','❌ '+d.error);
      break;

    case 'tool_start':
      addMsg('user', d.msg||'', null, d.attach||null);
      showThinking();
      break;

    case 'tool_progress':
      break;

    case 'tool_error':
      removeThinking();
      sending=false;
      document.getElementById('sendBtn').disabled=false;
      addMsg('system','❌ Error: '+(d.error||'unknown'));
      break;

    case 'response_ready':
      removeThinking();
      sending=false;
      document.getElementById('sendBtn').disabled=false;
      addMsg('ai', d.full||d.preview||'', d.model);
      refreshDL();
      break;

    case 'model_switched':{
      const sel=document.getElementById('modelSel');
      if(d.model){for(const o of sel.options){if(o.value===d.model){sel.value=d.model;break;}}}
      document.getElementById('modelStatus').textContent=d.success?'✓ '+d.note:'⚠ '+d.note;
      break;
    }
    case 'screenshot_ready':
      addMsg('system','📷 Screenshot: '+d.file);
      refreshDL();
      break;

    case 'new_chat':
      addMsg('system','✓ New chat started');
      break;

    case 'file_uploaded':{
      const li=document.getElementById('uploadList');
      const it=document.createElement('div');
      it.className='file-item';
      it.innerHTML=`<span title="${escHtml(d.filename)}">${escHtml(d.original)}</span><span style="color:var(--success)">✓</span>`;
      li.prepend(it);
      fetch(BASE+'/mcp',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({jsonrpc:'2.0',id:99,method:'tools/call',
          params:{name:'upload_file',arguments:{filename:d.filename}}})});
      break;
    }
    case 'file_sent_to_browser':
      addMsg('system','📎 Attached to Perplexity: '+d.file);
      break;
  }
}

function onFileChosen(inp){
  const f=inp.files[0];
  if(!f) return;
  pendingFile=f;
  document.getElementById('attachName').textContent=f.name;
  document.getElementById('attachPreview').classList.add('show');
  const ua=document.getElementById('uploadArea');
  ua.classList.add('has-file');
  ua.textContent='✓ '+f.name;
  const fd=new FormData();
  fd.append('file',f);
  fetch(BASE+'/upload',{method:'POST',body:fd})
    .catch(e=>addMsg('system','❌ Upload failed: '+e));
  inp.value='';
}

function clearAttach(){
  pendingFile=null;
  document.getElementById('attachPreview').classList.remove('show');
  document.getElementById('attachName').textContent='';
  const ua=document.getElementById('uploadArea');
  ua.classList.remove('has-file');
  ua.textContent='📎 Click to select file';
}

async function send(){
  const inp=document.getElementById('inp'), msg=inp.value.trim();
  if(!msg||sending) return;
  sending=true;
  document.getElementById('sendBtn').disabled=true;
  inp.value='';
  const attachLabel=pendingFile?pendingFile.name:null;
  clearAttach();
  const res=await fetch(BASE+'/mcp',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:1,method:'tools/call',
      params:{name:'send_message',arguments:{message:msg}}})
  }).catch(e=>{addMsg('system','❌ Fetch error: '+e);sending=false;document.getElementById('sendBtn').disabled=false;return null;});
  if(!res) return;
  const j=await res.json().catch(()=>null);
  if(j&&j.error){
    sending=false;
    document.getElementById('sendBtn').disabled=false;
    removeThinking();
    addMsg('system','❌ '+j.error.message);
  }
}

async function switchModel(m){
  document.getElementById('modelStatus').textContent='Switching…';
  await fetch(BASE+'/mcp',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:2,method:'tools/call',params:{name:'switch_model',arguments:{model:m}}})});
}

async function refreshDL(){
  const r=await fetch(BASE+'/downloads').catch(()=>null);
  if(!r) return;
  const j=await r.json().catch(()=>({files:[]}));
  document.getElementById('dlList').innerHTML=j.files.slice(0,10).map(f=>
    `<div class="file-item"><span title="${escHtml(f.name)}">${escHtml(f.name)}</span><a href="/download/${encodeURIComponent(f.name)}" download>↓</a></div>`
  ).join('');
}

async function newChat(){
  clearAttach();
  await fetch(BASE+'/mcp',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:4,method:'tools/call',params:{name:'new_chat',arguments:{}}})});}

async function takeShot(){
  await fetch(BASE+'/mcp',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:5,method:'tools/call',params:{name:'screenshot',arguments:{}}})});}

async function checkLogin(){
  const r=await fetch(BASE+'/mcp',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:6,method:'tools/call',params:{name:'check_login',arguments:{}}})});
  const j=await r.json().catch(()=>null);
  try{
    const d=JSON.parse(j.result.content[0].text);
    setStatus(d.logged_in?'ready':'warn', d.logged_in?'✓ Ready & Logged In':'⚠ Ready – Please Sign In');
    addMsg('system',`Login: ${d.logged_in?'✓ Logged in':'⚠ Not logged in'} | Mode: ${d.mode}`);
  }catch{}
}

connectSSE();
refreshDL();
</script>
</body>
</html>
